<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shamkhal Hajiyev - Work Experience</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }
        .experience-section {
            display: flex;
            align-items: center;
            font-size: 20px;
            margin: 20px;
        }
        .experience-section .dates {
            margin-right: 20px;
            text-align: right;
            flex-basis: 20%;
            position: relative;
        }
        .experience-section .dates::after {
            content: '';
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 1px;
            background-color: #000;
        }
        .experience-section .title {
            flex-grow: 2;
            padding-left: 20px; /* To ensure the title aligns with the after pseudo-element of dates */
        }
        .experience-section .location {
            background-color: #000;
            color: #fff;
            border-radius: 50%;
            padding: 0 10px;
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <div class="experience-section">
        <div class="dates">
            <div>Present</div>
            <div>Jan 2023</div>
        </div>
        <div class="title">
            <div>Data Science Specialist</div>
            <div>Align Technology</div>
        </div>
        <div class="location">Wroclaw, Poland</div>
    </div>
</body>
</html>
