<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shamkhal Hajiyev - Work Experience</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }
        .experience {
            display: flex;
            align-items: center;
            justify-content: start;
            margin: 20px;
        }
        .dates {
            margin-right: 20px;
            text-align: right;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .dates::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -10px;
            width: 1px;
            height: 40px; /* Adjust height as needed */
            background-color: #000;
            transform: translateY(-50%);
        }
        .title {
            padding: 0 20px;
            border-right: 1px solid #000;
        }
        .location {
            margin-left: 20px;
            font-size: 16px;
            display: flex;
            align-items: center;
        }
        .location::before {
            content: '\1F4CD'; /* Unicode for the round pushpin, used as a placeholder for the icon */
            font-size: 24px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="experience">
        <div class="dates">
            <span>Present</span>
            <!-- Vertical line to separate dates and title/position -->
            <span>Jan 2023</span>
        </div>
        <div class="title">
            <h2>Data Science Specialist</h2>
            <p>Align Technology</p>
        </div>
        <div class="location">
            <!-- Location text with icon before it -->
            <span>Wroclaw, Poland</span>
        </div>
    </div>
</body>
</html>
