<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shamkhal Hajiyev - Work Experience</title>
    <!-- Include FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }
        .experience {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Updated this line */
            margin: 20px;
        }
        .dates {
            margin-right: 20px;
            text-align: right;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .dates::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -10px;
            width: 1px;
            height: 40px;
            background-color: #000;
            transform: translateY(-50%);
        }
        .title {
            padding: 0 20px;
            /* Removed border style */
        }
        .location {
            font-size: 16px;
            display: flex;
            align-items: center;
        }
        /* FontAwesome icon before the location text */
        .location i {
            color: #000;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="experience">
        <div class="dates">
            <span>Present</span>
            <span>Jan 2023</span>
        </div>
        <div class="title">
            <h2>Data Science Specialist</h2>
            <p>Align Technology</p>
        </div>
        <!-- Location with FontAwesome icon aligned to the right -->
        <div class="location">
            <i class="fas fa-map-marker-alt"></i>
            <span>Wroclaw, Poland</span>
        </div>
    </div>
</body>
</html>
