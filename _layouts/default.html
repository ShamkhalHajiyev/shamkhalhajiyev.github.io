<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shamkhal Hajiyev Personal Webpage</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/5.1.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <!-- Bootstrap Dark Mode Toggle -->
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider round"></div>
                </label>
            </div>
            <img src="/assets/img/ProfilePhoto.jpg" alt="Shamkhal Hajiyev" class="profile-picture">
            <h1>Shamkhal Hajiyev</h1>
            <p>Welcome to my personal webpage!</p>
        </header>
        <main>
            <section class="bio">
                <!-- Your bio content -->
            </section>
            <div class="social-links">
                <!-- Social links -->
                <!-- ... -->
            </div>
        </main>
    </div>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/5.1.0/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('darkModeSwitch').addEventListener('change', function(event){
          if(event.currentTarget.checked){
            document.body.classList.add('dark-mode');
          } else {
            document.body.classList.remove('dark-mode');
          }
        });
    </script>
</body>
</html>
