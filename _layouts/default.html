<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shamkhal Hajiyev Personal Webpage</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <script type="module" src="https://googlechromelabs.github.io/dark-mode-toggle/src/dark-mode-toggle.mjs"></script>
</head>
<body>
    <div class="container">
        <header>
            <dark-mode-toggle
                id="dark-mode-toggle-1"
                legend="Theme Switcher"
                appearance="switch"
                dark="Dark"
                light="Light"
                remember="Remember this"
            ></dark-mode-toggle>
            <img src="/assets/img/ProfilePhoto.jpg" alt="Shamkhal Hajiyev" class="profile-picture">
            <h1>Shamkhal Hajiyev</h1>
            <p>Welcome to my personal webpage!</p>
        </header>
        <main>
            <section class="bio">
                <!-- Your bio content -->
            </section>
            <!-- Other content sections -->
        </main>
        <footer>
            <div class="social-links">
                <!-- Social links -->
            </div>
        </footer>
    </div>
    <script>
        const toggle = document.querySelector('dark-mode-toggle');
        const body = document.body;

        toggle.mode === 'dark' ? body.classList.add('dark') : body.classList.remove('dark');

        toggle.addEventListener('colorschemechange', () => {
          body.classList.toggle('dark', toggle.mode === 'dark');
        });
    </script>
</body>
</html>
