<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shamkhal Hajiyev Personal Webpage</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <button id="theme-toggle">Toggle Theme</button>
            <img src="/assets/img/ProfilePhoto.jpg" alt="Shamkhal Hajiyev" class="profile-picture">
            <h1>Shamkhal Hajiyev</h1>
            <p>Welcome to my personal webpage!</p>
        </header>
        <main>
            <section class="bio">
                <!-- Your bio content -->
                <p>I am a PhD candidate in Finance at the Frankfurt School of Finance and Management.</p>
                <!-- More bio content -->
            </section>
            <!-- Other content sections -->
        </main>
        <footer>
            <div class="social-links">
                <!-- Social links -->
                <a href="https://www.linkedin.com/in/yourusername" target="_blank" title="LinkedIn">
                    <i class="fab fa-linkedin"></i>
                </a>
                <a href="https://github.com/yourusername" target="_blank" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
            </div>
        </footer>
    </div>
    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark-mode' : 'light');
        }

        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

        document.addEventListener('DOMContentLoaded', (event) => {
            if(localStorage.getItem('theme') === 'dark-mode') {
                document.body.classList.add('dark-mode');
            }
        });
    </script>
</body>
</html>
