<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shamkhal Hajiyev Personal Webpage</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <button id="theme-toggle">Toggle Theme</button>
            <img src="/assets/img/ProfilePhoto.jpg" alt="Shamkhal Hajiyev" class="profile-picture">
            <h1>Shamkhal Hajiyev</h1>
            <p>Welcome to my personal webpage!</p>
        </header>
        <main>
            <section class="bio">
                <!-- Your bio information here -->
            </section>
            <!-- Other sections for content -->
        </main>
        <footer>
            <div class="social-links">
                <!-- Social links here -->
            </div>
        </footer>
    </div>
    <script>
        // JavaScript for theme toggle
        var themeToggleButton = document.getElementById('theme-toggle');
        var currentTheme = localStorage.getItem('theme');

        if(currentTheme) {
            document.body.classList.add(currentTheme);
        }

        themeToggleButton.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');

            var theme = document.body.classList.contains('dark-mode') ? 'dark-mode' : '';
            localStorage.setItem('theme', theme);
        });
    </script>
</body>
</html>
